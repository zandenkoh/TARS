<!-- User Message Row -->
<div class="flex flex-col items-end space-y-1 mb-6 animate-slide-up group">
    <div class="max-w-[85%] bg-zinc-800/50 rounded-2xl px-5 py-2.5 text-zinc-100 border border-white/5 selection:bg-tars-primary/30">
        <p class="text-[14px] leading-relaxed">{{ user_message }}</p>
    </div>
    <div class="px-2">
        <span class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">You</span>
    </div>
</div>

<!-- Bot Message Row -->
<div class="flex items-start gap-4 mb-6 group transition-all animate-fade-in relative -mx-2 px-2 py-4 rounded-2xl hover:bg-white/[0.02]">
    <div class="w-8 h-8 rounded-full bg-white flex-shrink-0 flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform overflow-hidden">
        <img src="/static/icon-192.png" alt="TARS" class="w-5 h-5 object-contain p-0.5">
    </div>
    <div class="flex-1 min-w-0 space-y-3 pt-0.5">
        <div class="flex items-center gap-2">
            <span class="text-xs font-bold text-zinc-100 uppercase tracking-wider font-heading">TARS</span>
            <span class="text-[10px] text-zinc-600 font-medium tracking-wide">• Verified</span>
        </div>
        
        <div class="text-[15px] text-zinc-300 leading-relaxed whitespace-pre-wrap selection:bg-tars-primary/30 prose prose-invert prose-sm max-w-none">
            {{ bot_reply }}
        </div>
        
        <!-- Action Toolbar -->
        <div class="flex items-center gap-4 pt-1 opacity-0 group-hover:opacity-100 transition-all">
            <button aria-label="Copy" class="text-zinc-500 hover:text-zinc-200 transition-colors" title="Copy">
                <svg class="w-3.5 h-3.5" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            </button>
            <button aria-label="Export" class="text-zinc-500 hover:text-zinc-200 transition-colors" title="Export">
                <svg class="w-3.5 h-3.5" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
    </div>
</div>
