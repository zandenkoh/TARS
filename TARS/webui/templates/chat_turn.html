<div class="space-y-6 animate-slide-up">
    <!-- User Message -->
    <div class="flex flex-col items-end space-y-1 group">
        <div class="max-w-[85%] bg-zinc-800/50 rounded-2xl px-5 py-2.5 text-zinc-100 border border-white/5 selection:bg-tars-primary/30">
            <p class="text-[14px] leading-relaxed">{{ user_message }}</p>
        </div>
        <div class="px-2">
            <span class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">You</span>
        </div>
    </div>

    <!-- The Bot wrapper -->
    <div class="flex items-start gap-4 group transition-all animate-fade-in relative -mx-2 px-2 py-4 rounded-2xl hover:bg-white/[0.02]">
        <div class="w-8 h-8 rounded-full bg-white flex-shrink-0 flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform overflow-hidden">
            <img src="/static/icon-192.png" alt="TARS" class="w-5 h-5 object-contain p-0.5">
        </div>
        <div class="flex-1 min-w-0 space-y-3 pt-0.5">
            <div class="flex items-center gap-2">
                <span class="text-xs font-bold text-zinc-100 uppercase tracking-wider font-heading">TARS</span>
                <div id="response-status-{{ turn_id }}">
                    <!-- Tool hints from SSE OOB will appear here -->
                </div>
            </div>
            
            <div hx-ext="sse" 
                 sse-connect="/api/chat/stream?turn_id={{ turn_id }}&content={{ user_message | urlencode }}&session_id={{ session_id }}" 
                 sse-swap="message" 
                 hx-swap="beforeend"
                 class="text-[15px] text-zinc-300 leading-relaxed whitespace-pre-wrap selection:bg-tars-primary/30 prose prose-invert prose-sm max-w-none"><div id="response-thinking-{{ turn_id }}" class="flex gap-1 items-center py-2"><div class="w-1.5 h-1.5 rounded-full bg-zinc-600 animate-pulse"></div><div class="w-1.5 h-1.5 rounded-full bg-zinc-600 animate-pulse [animation-delay:0.2s]"></div><div class="w-1.5 h-1.5 rounded-full bg-zinc-600 animate-pulse [animation-delay:0.4s]"></div></div></div>
        </div>
    </div>
</div>
