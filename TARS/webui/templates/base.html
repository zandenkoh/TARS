<!DOCTYPE html>
<!-- Part of TARS integrated web UI – premium evolution -->
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TARS | Ultra-Lightweight AI Assistant</title>
    
    <!-- PWA Foundations -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#09090b">
    <link rel="icon" type="image/png" href="/static/icon-192.png">

    <!-- CSS/Styles: Tailwind CDN with advanced config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              tars: {
                black: '#0d0d0f',
                sidebar: '#18181b',
                border: 'rgba(255,255,255,0.06)',
                primary: '#38bdf8',
                accent: '#818cf8',
                zinc: {
                    950: '#09090b',
                    900: '#121214',
                    800: '#1e1e20'
                }
              }
            },
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
            },
            backdropBlur: {
              xs: '2px',
              '2xl': '40px',
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out forwards',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pulse-subtle': 'pulseSubtle 3s infinite ease-in-out',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pulseSubtle: {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '0.85', transform: 'scale(0.99)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    
    <!-- HTMX + Extensions -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.1/sse.js"></script>
    
    <!-- Premium Fonts: Inter and Outfit for Headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Modern Reset & Scrollbars */
      :root {
        --foreground-rgb: 255, 255, 255;
        --background-start-rgb: 0, 0, 0;
        --background-end-rgb: 0, 0, 0;
      }
      
      body {
        background-color: #09090b;
        color: #f4f4f5;
        font-family: 'Inter', -apple-system, sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3, .font-heading {
        font-family: 'Outfit', sans-serif;
      }

      /* Custom Scrollbar for sleek look */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }

      /* Glassmorphism helpers */
      .glass {
        background: rgba(18, 18, 21, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .safe-top { padding-top: env(safe-area-inset-top); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="safe-top safe-bottom selection:bg-sky-500/30 overflow-hidden font-inter">
    {% block content %}{% endblock %}
</body>
</html>
